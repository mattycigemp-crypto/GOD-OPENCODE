<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b"/>
      <stop offset="100%" style="stop-color:#0c0c0e"/>
    </linearGradient>
    <linearGradient id="violet-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="pink-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" rx="12" fill="url(#bg2)" stroke="#27272a" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#fafafa" font-size="14" font-weight="700" letter-spacing="0.05em">GOD-OPENCODE PIPELINE</text>
  <text x="400" y="50" text-anchor="middle" fill="#71717a" font-size="11">Your request flows through 6 specialized layers</text>

  <!-- Step 1: Intent Detection -->
  <g transform="translate(40, 80)" filter="url(#shadow)">
    <rect width="110" height="70" rx="10" fill="#18181b" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="55" cy="25" r="12" fill="#8b5cf6" opacity="0.15"/>
    <text x="55" y="30" text-anchor="middle" fill="#8b5cf6" font-size="16">&#x1F3AF;</text>
    <text x="55" y="50" text-anchor="middle" fill="#fafafa" font-size="10" font-weight="600">Intent</text>
    <text x="55" y="62" text-anchor="middle" fill="#71717a" font-size="9">auto-router</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="155" y1="115" x2="175" y2="115" stroke="#3f3f46" stroke-width="1.5" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="7;0" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="175,112 180,115 175,118" fill="#3f3f46"/>

  <!-- Step 2: Agent Selection -->
  <g transform="translate(185, 80)" filter="url(#shadow)">
    <rect width="110" height="70" rx="10" fill="#18181b" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="55" cy="25" r="12" fill="#06b6d4" opacity="0.15"/>
    <text x="55" y="30" text-anchor="middle" fill="#06b6d4" font-size="16">&#x1F916;</text>
    <text x="55" y="50" text-anchor="middle" fill="#fafafa" font-size="10" font-weight="600">Agent</text>
    <text x="55" y="62" text-anchor="middle" fill="#71717a" font-size="9">orchestrator</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="300" y1="115" x2="320" y2="115" stroke="#3f3f46" stroke-width="1.5" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="7;0" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="320,112 325,115 320,118" fill="#3f3f46"/>

  <!-- Step 3: Skill Loading -->
  <g transform="translate(330, 80)" filter="url(#shadow)">
    <rect width="110" height="70" rx="10" fill="#18181b" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="55" cy="25" r="12" fill="#22c55e" opacity="0.15"/>
    <text x="55" y="30" text-anchor="middle" fill="#22c55e" font-size="16">&#x1F9E0;</text>
    <text x="55" y="50" text-anchor="middle" fill="#fafafa" font-size="10" font-weight="600">Skills</text>
    <text x="55" y="62" text-anchor="middle" fill="#71717a" font-size="9">88 domain</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="445" y1="115" x2="465" y2="115" stroke="#3f3f46" stroke-width="1.5" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="7;0" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="465,112 470,115 465,118" fill="#3f3f46"/>

  <!-- Step 4: Workflow Execution -->
  <g transform="translate(475, 80)" filter="url(#shadow)">
    <rect width="110" height="70" rx="10" fill="#18181b" stroke="#ec4899" stroke-width="1.5"/>
    <circle cx="55" cy="25" r="12" fill="#ec4899" opacity="0.15"/>
    <text x="55" y="30" text-anchor="middle" fill="#ec4899" font-size="16">&#x2699;</text>
    <text x="55" y="50" text-anchor="middle" fill="#fafafa" font-size="10" font-weight="600">Workflow</text>
    <text x="55" y="62" text-anchor="middle" fill="#71717a" font-size="9">16 processes</text>
  </g>

  <!-- Arrow 4 -->
  <line x1="590" y1="115" x2="610" y2="115" stroke="#3f3f46" stroke-width="1.5" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="7;0" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="610,112 615,115 610,118" fill="#3f3f46"/>

  <!-- Step 5: Verification -->
  <g transform="translate(620, 80)" filter="url(#shadow)">
    <rect width="110" height="70" rx="10" fill="#18181b" stroke="#f97316" stroke-width="1.5"/>
    <circle cx="55" cy="25" r="12" fill="#f97316" opacity="0.15"/>
    <text x="55" y="30" text-anchor="middle" fill="#f97316" font-size="16">&#x1F50D;</text>
    <text x="55" y="50" text-anchor="middle" fill="#fafafa" font-size="10" font-weight="600">Verify</text>
    <text x="55" y="62" text-anchor="middle" fill="#71717a" font-size="9">security scan</text>
  </g>

  <!-- Arrow 5 -->
  <line x1="665" y1="160" x2="665" y2="185" stroke="#3f3f46" stroke-width="1.5" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="7;0" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="662,185 665,192 668,185" fill="#3f3f46"/>

  <!-- Output bar -->
  <g transform="translate(40, 200)">
    <rect width="720" height="60" rx="10" fill="#18181b" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="360" y="25" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="700" letter-spacing="0.1em">OUTPUT</text>
    <text x="20" y="45" fill="#22c55e" font-size="11">&#x2714; Code generated</text>
    <text x="160" y="45" fill="#22c55e" font-size="11">&#x2714; Tests passing</text>
    <text x="310" y="45" fill="#22c55e" font-size="11">&#x2714; Security clean</text>
    <text x="470" y="45" fill="#22c55e" font-size="11">&#x2714; Committed</text>
    <text x="590" y="45" fill="#22c55e" font-size="11">&#x2714; Deployed</text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="290" width="800" height="10" rx="0" fill="url(#violet-grad)" opacity="0.4"/>
</svg>