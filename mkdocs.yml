site_name: GOD-OPENCODE Wiki
site_description: Single source of truth for the GOD-OPENCODE AI engineering operating system — architecture, install matrix, and the four open architectural concerns.
site_url: https://mattycigemp-crypto.github.io/GOD-OPENCODE/
repo_url: https://github.com/mattycigemp-crypto/GOD-OPENCODE
repo_name: mattycigemp-crypto/GOD-OPENCODE

docs_dir: docs/wiki
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mattycigemp-crypto/GOD-OPENCODE

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Code Graph: graph.md
  - Dynamic Skills: dynamic-skills.md
  - Cross-Platform: cross-platform.md
  - Memory: memory.md
  - Roadmap: roadmap.md