name: Build and Deploy Wiki

# Triggers:
#   - push to master when wiki content or mkdocs config changes
#   - manual dispatch (workflow_dispatch) for ad-hoc deploys
on:
  push:
    branches: [master]
    paths:
      - 'docs/wiki/**'
      - 'mkdocs.yml'
      - '.github/workflows/wiki-pages.yml'
  workflow_dispatch:

# Required by actions/deploy-pages: pages:write to upsert the deployment,
# id-token:write to authenticate via OIDC. contents:read is the default for
# checkout. We deliberately do NOT request contents:write anywhere — the
# old `mkdocs gh-deploy --force` push-to-gh-pages path is gone.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any in-flight run for the same ref when a new push arrives.
concurrency:
  group: wiki-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build wiki
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: >-
            ${{ runner.os }}-pip-mkdocs-${{ hashFiles('mkdocs.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-mkdocs-

      - name: Install mkdocs-material (pinned minor)
        # ~=9.5.0 pins to the 9.5.x line so a future mkdocs 10.x can't
        # silently break the wiki build.
        run: |
          python -m pip install --upgrade pip
          pip install "mkdocs-material~=9.5.0" "mkdocs~=1.6.0"

      - name: Build wiki (strict)
        # --strict fails the build on any warning (broken links, missing
        # files). Keeps the wiki honest.
        run: mkdocs build --strict

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4